<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Data Project</title>
    <script type="module" src="script.mjs"></script>
  </head>

  <body>
    <main>
      <h1>My Music Data</h1>

      <div>
        <label for="user-dropdown">Select user: </label>
        <select id="user-dropdown"></select>
      </div>

      <div id="music-data">
        <section id="most-listened-song" class="number"><p></p></section>
        <section id="most-listened-artist" class="number"><p></p></section>
        <section id="most-listened-song-Friday" class="number"><p></p></section>
        <section id="most-listened-song-v2" class="length"><p></p></section>
        <section id="most-listened-artist-v2" class="length"><p></p></section>
        <section id="most-listened-song-Friday-v2" class="length"><p></p></section>
        <section id="most-times-in-a-row"><p></p></section>
        <section id="listen-everyday"><p></p></section>
        <section id="top-3-genres" class="number"><p></p></section>
      </div>
    </main>
  </body>
</html>
